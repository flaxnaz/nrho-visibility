name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install numpy scipy matplotlib pandas pytest pytest-cov pyyaml

      - name: Run tests
        run: |
          python -m pytest tests/ -v --cov=src --cov-report=term-missing

      - name: Check coverage
        run: |
          python -m pytest tests/ --cov=src --cov-fail-under=70